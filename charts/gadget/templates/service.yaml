apiVersion: v1
kind: Service
metadata:
  labels:
    {{- if not .Values.skipLabels }}
    {{- include "gadget.labels" . | nindent 4 }}
    {{- end }}
    k8s-app: {{ include "gadget.fullname" . }}
  name: {{ include "gadget.fullname" . }}
  namespace: {{ include "gadget.namespace" . }}
spec:
  clusterIP: None
  selector:
    {{- if not .Values.skipLabels }}
    {{- include "gadget.selectorLabels" . | nindent 4 }}
    {{- end }}
    k8s-app: {{ include "gadget.fullname" . }}

