# Default values for gadget.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# -- Inspektor Gadget configuration.
config:
  # -- Containerd CRI Unix socket path
  containerdSocketPath: "/run/containerd/containerd.sock"
  # -- CRI-O CRI Unix socket path
  crioSocketPath: "/run/crio/crio.sock"
  # -- Docker Engine API Unix socket path
  dockerSocketPath: "/run/docker.sock"
  # -- Podman API Unix socket path
  podmanSocketPath: "/run/podman/podman.sock"

  # -- Enable experimental features
  experimental: false

  # -- Events buffer length. A low value could impact horizontal scaling.
  eventsBufferLength: "16384"

  # -- Daemon Log Level. Valid values are: "trace", "debug", "info", "warning", "error", "fatal", "panic"
  daemonLogLevel: "info"

  # -- Operator configuration, this will only be used if deprecated values are not set.
  operator:
    kubemanager:
      # -- Whether to use the fallback to pod informer
      fallback-podinformer: true
      # -- How to get containers start/stop notifications. Valid values are: "auto", "crio", "podinformer", "nri", "fanotify+ebpf"
      hook-mode: "auto"
    oci:
      verify-image: true
      public-keys:
        - |
          -----BEGIN PUBLIC KEY-----
          MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEoDOC0gYSxZTopenGmX3ZFvQ1DSfh
          Ir4EKRt5jC+mXaJ7c7J+oREskYMn/SfZdRHNSOjLTZUMDm60zpXGhkFecg==
          -----END PUBLIC KEY-----
      allowed-gadgets: []
      disallow-pulling: false
      insecure-registries: []
    otel-metrics:
      otel-metrics-listen: false
      otel-metrics-listen-address: "0.0.0.0:2224"

  # -- Gadget ConfigMaps to create. Each entry creates a ConfigMap with
  # label `type: gadget-instance` that the gadget daemon will reconcile and run
  # automatically.
  gadgetConfigMaps: []
    # - name: my-trace-open
    #   imageName: ghcr.io/inspektor-gadget/trace_open:latest
    #   # -- Optional: tags for the gadget instance
    #   tags: []
    #   # -- Optional: timeout in nanoseconds (0 means no timeout, e.g. 300000000000 for 5 minutes)
    #   timeout: 0
    #   # -- Optional: log level (0=default)
    #   logLevel: 0
    #   # -- Optional: restrict to specific nodes
    #   nodes: []
    #   # -- Optional: gadget parameters as key-value pairs
    #   paramValues: {}
    #     # operator.filter.filter: "fname~/proc.*"

# -- All configurations below are specific to Kubernetes resources created by the gadget chart.
image:
  # -- Container repository for the container image
  repository: ghcr.io/inspektor-gadget/inspektor-gadget
  # -- Pull policy for the container image
  pullPolicy: Always
  # -- Tag for the container image
  tag: ""
  # -- Pull secrets for the daemonset image
  pullSecrets: []

# -- Node selector used by `gadget` container
nodeSelector:
  kubernetes.io/os: linux

# -- Affinity used by `gadget` container
affinity: {}

# -- Capabilities used by `gadget` container
capabilities: {}

# -- Tolerations used by `gadget` container
tolerations: {}

# -- Resource requests and limits for the `gadget` container.
# See https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
resources: {}
  # limits:
  #   cpu: 1000m
  #   memory: 1Gi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# -- Skip Helm labels
skipLabels: false

# -- Labels to be added to all other resources.
additionalLabels:
  labels: {}

# -- Use the host PID namespace
hostPID: false

# -- Use the host network namespace
hostNetwork: false

# -- RuntimeClassName used by daemonset
runtimeClassName: ""

# -- Mount pull secret (gadget-pull-secret) to pull image-based gadgets from private registry
mountPullSecret: false

# -- Set AppArmor profile.
appArmorProfile: "unconfined"

# -- Additional environment variables to add to the gadget container
additionalEnv: []
  # - name: EXAMPLE_VAR
  #   value: "example_value"
  # - name: EXAMPLE_SECRET_VAR
  #   valueFrom:
  #     secretKeyRef:
  #       name: secret-name
  #       key: secret-key

# -- Telemetry bridges. A bridge is an optional sidecar that runs
# alongside Inspektor Gadget and publishes external telemetry into
# bpffs-pinned BPF maps that consumer gadgets read for per-event
# enrichment. Grouped under `bridges` so future non-GPU bridges can
# be added alongside `gpu`.
bridges:
  # -- gpu-ebpf-bridge sidecar. When enabled, adds a gpu-ebpf-bridge
  # container to the IG pod. The bridge polls NVIDIA GPUs via NVML and
  # publishes telemetry into bpffs-pinned BPF maps that consumer
  # gadgets can read for per-event enrichment.
  # See docs/design/004-gpu-telemetry-enricher.md for the full design.
  gpu:
    # -- Enable the gpu-ebpf-bridge sidecar container. Off by default.
    # Requires hostPID=true so the bridge can enumerate GPU-using
    # processes via NVML (the driver returns host PIDs from
    # nvmlDeviceGetComputeRunningProcesses and needs the container to
    # be in the host PID namespace to correlate them with /proc). The
    # chart's template refuses to render if this is inconsistent.
    enabled: false

    image:
      # -- Container repository for the gpu-ebpf-bridge image
      repository: ghcr.io/inspektor-gadget/gpu-ebpf-bridge
      # -- Pull policy for the gpu-ebpf-bridge container image
      pullPolicy: Always
      # -- Tag for the gpu-ebpf-bridge container image. Defaults to
      # the same tag as the main gadget image.
      tag: ""

    # -- Poll interval for NVML. Lower = fresher data at higher CPU cost.
    pollInterval: 500ms

    # -- Log verbosity: debug, info, warn, error.
    logLevel: info

    # -- How the bridge container obtains GPU access. Pick based on
    # your cluster's GPU setup:
    #
    #   toolkit-env    (recommended) Sets NVIDIA_VISIBLE_DEVICES=all
    #                  + NVIDIA_DRIVER_CAPABILITIES=utility. The
    #                  NVIDIA Container Toolkit's runc prestart hook
    #                  bind-mounts libnvidia-ml.so.1 and grants
    #                  /dev/nvidia* access. Does NOT reserve a GPU
    #                  for scheduling. Same setting DCGM Exporter
    #                  uses. Works on clusters with the NVIDIA GPU
    #                  Operator, GKE, OpenShift, AKS-with-GPU-Operator,
    #                  and self-managed k8s where
    #                  nvidia-container-runtime is the default runtime.
    #
    #   hostpath       Bypasses the toolkit hook. Bind-mounts /host/dev
    #                  and /host/usr from the node into the bridge
    #                  container so it can reach the NVIDIA driver's
    #                  char devices and libnvidia-ml.so.1 regardless
    #                  of the container runtime configuration. Both
    #                  hostPath source paths (/dev and /usr) exist on
    #                  every Linux node, so kubelet accepts the pod on
    #                  non-GPU nodes too; the bridge idles at runtime
    #                  when NVML is unavailable. The bridge locates
    #                  libnvidia-ml.so.1 itself under /host/usr/ (no
    #                  LD_LIBRARY_PATH pollution: a broad
    #                  LD_LIBRARY_PATH would drag the host's libc into
    #                  the container's dynamic-linker search path and
    #                  trigger "stack smashing detected" from glibc's
    #                  canary check on version mismatch). Works on any
    #                  cluster including AKS default GPU node pools.
    #
    #   device-plugin  Requests nvidia.com/gpu: 1 via resources.limits.
    #                  WARNING: reserves a GPU per node for the bridge,
    #                  unavailable to workloads. Not recommended for
    #                  fleet-wide telemetry; only useful if MIG is
    #                  used with a dedicated telemetry partition.
    accessMode: toolkit-env

    # -- Resource requests and limits for the gpu-ebpf-bridge container.
    resources: {}
      # limits:
      #   cpu: 200m
      #   memory: 128Mi
      # requests:
      #   cpu: 50m
      #   memory: 32Mi

    # -- Additional environment variables to add to the gpu-ebpf-bridge
    # container.
    additionalEnv: []
