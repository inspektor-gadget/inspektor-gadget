syntax = "proto3";

option go_package = "github.com/inspektor-gadget/inspektor-gadget/gadgets/trace_grpc/test/workload/proto";

package helloworld;

service Greeter {
  rpc SayHello (HelloRequest) returns (HelloReply) {}
}

message HelloRequest {
  string name = 1;
}

message HelloReply {
  string message = 1;
}
