name: trace malloc
description: use uprobe to trace malloc and free in libc.so
homepageURL: https://inspektor-gadget.io/
documentationURL: https://www.inspektor-gadget.io/docs/latest/gadgets/trace_malloc
sourceURL: https://github.com/inspektor-gadget/inspektor-gadget/tree/main/gadgets/trace_malloc
datasources:
  malloc:
    fields:
      operation_raw:
        annotations:
          columns.hidden: true
      operation:
        annotations:
          description: memory operation type
      addr:
        annotations:
          description: address of malloc/free operations
          columns.width: 20
          columns.hex: true
      size:
        annotations:
          description: size of malloc operations
          columns.width: 20
      ustack:
        annotations:
          columns.hidden: true
      ustack.addresses:
        annotations:
          description: User stack's addresses
          columns.hidden: true
          columns.width: 20
      ustack.symbols:
        annotations:
          description: User stack's symbols
          columns.hidden: true
          columns.width: 20
params:
  ebpf:
    print_ustack:
      key: print-ustack
      defaultValue: "false"
      description: Show user stack traces
