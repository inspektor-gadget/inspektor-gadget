name: trace dns
description: trace dns requests and responses
homepageURL: https://inspektor-gadget.io/
documentationURL: https://inspektor-gadget.io/docs/latest/
sourceURL: https://github.com/inspektor-gadget/inspektor-gadget
tracers:
  dns:
    mapName: events
    structName: event_t
structs:
  event_t:
    fields:
    - name: timestamp_raw
    - name: src
      description: Source endpoint
      attributes:
        minWidth: 24
        maxWidth: 50
    - name: dst
      description: Destination endpoint
      attributes:
        minWidth: 24
        maxWidth: 50
    - name: pid
      description: PID of the process that sent the request
      attributes:
        template: pid
    - name: task
      attributes:
        template: comm
    - name: uid
      attributes:
        hidden: true
        template: uid
    - name: gid
      attributes:
        hidden: true
        template: uid
    - name: netns
      description: Network namespace inode id
      attributes:
        template: ns
        hidden: true
    - name: mntns_id
      description: Mount namespace inode id
      attributes:
        template: ns
        hidden: true
    - name: tid
      description: 'TODO: Fill field description'
      attributes:
        width: 16
        alignment: left
        hidden: true
        ellipsis: end
    # These fields are internal, hide them from the user
    - name: data
      annotations:
        json.skip: true
      attributes:
        hidden: true
    - name: data_len
      annotations:
        json.skip: true
      attributes:
        hidden: true
    - name: dns_off
      annotations:
        json.skip: true
      attributes:
        hidden: true
