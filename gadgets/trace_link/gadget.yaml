name: trace link
description: trace hardlink and symlink creation
homepageURL: https://inspektor-gadget.io/
documentationURL: https://www.inspektor-gadget.io/docs/latest/gadgets/trace_link
sourceURL: https://github.com/inspektor-gadget/inspektor-gadget/tree/main/gadgets/trace_link
tags:
  - file
  - filesystem
  - syscall
datasources:
  link:
    fields:
      proc.parent.tid:
        annotations:
          columns.hidden: true
      type_raw:
        annotations:
          columns.hidden: true
      type:
        annotations:
          description: "Link type"
          value.one-of: "HARDLINK, SYMLINK"
          columns.width: 8
      target:
        annotations:
          description: "For hardlink: source file path. For symlink: raw target string"
          columns.width: 48
          columns.minwidth: 24
      linkpath:
        annotations:
          description: "Path of the link being created (hardlink destination or symlink path)"
          columns.width: 48
          columns.minwidth: 24
