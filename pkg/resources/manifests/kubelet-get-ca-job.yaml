---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gadget-ca-job
  namespace: gadget
  labels:
    k8s-app: gadget
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gadget-ca-job
  namespace: gadget
  labels:
    k8s-app: gadget
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gadget-ca-job
  namespace: gadget
  labels:
    k8s-app: gadget
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gadget-ca-job
subjects:
  - kind: ServiceAccount
    name: gadget-ca-job
    namespace: gadget
---
apiVersion: batch/v1
kind: Job
metadata:
  name: gadget-ca-job
  namespace: gadget
  labels:
    k8s-app: gadget
spec:
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: gadget-ca-job
      restartPolicy: Never
      containers:
        - name: kubelet-get-ca
          image: ghcr.io/inspektor-gadget/kubelet-get-ca:latest
          env:
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
      tolerations:
        - effect: NoSchedule
          operator: Exists
        - effect: NoExecute
          operator: Exists
